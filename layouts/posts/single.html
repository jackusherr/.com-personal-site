<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <div style="max-width: 640px; margin: 60px auto; padding: 0 20px;">
    <p><a href="/posts/">← Back to Blog</a></p>
    <h1>{{ .Title }}</h1>
    {{ with .Date }}<p>{{ .Format "January 2, 2006" }}</p>{{ end }}
    {{ .Content }}
    <p><a href="/">Home</a></p>
  </div>
</body>
</html>
